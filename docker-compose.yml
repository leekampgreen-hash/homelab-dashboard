version: "3.9"

services:

  dashboard:

    build: .

    container_name: dashboard

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./app:/app


  collector:

    build: .

    container_name: collector

    restart: unless-stopped

    command: python collector.py

    env_file:
      - .env

    volumes:
      - ./app:/app
