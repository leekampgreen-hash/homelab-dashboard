<div class="row mb-4">

    <div class="col-md-8">

        <h2 class="mb-1">
            🖥️ Homelab Dashboard
        </h2>

        <p class="text-muted mb-0">
            VMware ESXi Infrastructure Monitoring
        </p>

        <div class="mt-2">
            <span id="system-health" class="badge text-bg-success">
                🟢 System Health: Healthy (0 alerts)
            </span>
        </div>

    </div>

    <div class="col-md-4 text-end">

        <div class="card">

            <div class="card-body">

                <small class="text-muted">
                    Last Refresh
                </small>

                <h6 id="last-refresh" class="mb-2">
                    {{ updated.summary | default("--") }}
                </h6>

                <small id="data-status" class="text-muted d-block mb-2">
                    {% if data_current %}
                        🟢 Data Current
                    {% else %}
                        🟡 Stale Data
                    {% endif %}
                </small>

                <small class="text-muted">
                    Auto Refresh
                </small>

                <h5 id="refresh-countdown" class="text-primary mb-0">
                    30s
                </h5>

            </div>

        </div>

    </div>

</div>
